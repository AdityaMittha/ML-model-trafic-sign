  "Left Turn": Left Turn
  "left turn": Left Turn
  "turn right": Right Turn
  "Right Turn": Right Turn
  "right turn": Right Turn
  "u-turn": U-Turn
  "U-Turn": U-Turn
  "u turn": U-Turn
  "no horn": No Horn
  "No Horn": No Horn
  "school zone": School Zone
  "School Zone": School Zone
  "school": School Zone
  "pedestrian crossing": Pedestrian Crossing
  "Pedestrian Crossing": Pedestrian Crossing
  "crosswalk": Pedestrian Crossing
  "give way": Give Way
  "Give Way": Give Way
  "yield": Give Way
  "one way": One Way
  "One Way": One Way
  "roundabout": Roundabout
  "Roundabout": Roundabout
  "railway crossing": Railway Crossing
  "Railway Crossing": Railway Crossing
  "railroad crossing": Railway Crossing
  "road work": Road Work
  "Road Work": Road Work
  "construction": Road Work
  "narrow road": Narrow Road
  "Narrow Road": Narrow Road
  "speed limit 20": Speed Limit 20
  "Speed Limit 20": Speed Limit 20
  "speed limit 30": Speed Limit 30
  "Speed Limit 30": Speed Limit 30
  "speed limit 40": Speed Limit 40
  "Speed Limit 40": Speed Limit 40
  "speed limit 50": Speed Limit 50
