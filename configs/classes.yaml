# Indian Traffic Sign Classes - 20 target classes
# Designed for easy extension: add new entries under 'classes' and update 'num_classes'

num_classes: 20

classes:
  0: Stop
  1: No Entry
  2: Left Turn
  3: Right Turn
  4: U-Turn
  5: No Horn
  6: School Zone
  7: Pedestrian Crossing
  8: Give Way
  9: One Way
  10: Roundabout
  11: Railway Crossing
  12: Road Work
  13: Narrow Road
  14: Speed Limit 20
  15: Speed Limit 30
  16: Speed Limit 40
  17: Speed Limit 50
  18: Speed Limit 60
  19: Speed Limit 80

# Mapping from common dataset label names to our standardized class names
label_mapping:
  # GTSRB / generic
  "stop": Stop
  "Stop": Stop
  "stop sign": Stop
  "no entry": No Entry
  "No Entry": No Entry
  "no-entry": No Entry
