# Training hyperparameters - tuned for traffic sign detection

training:
  model: yolo11n.pt
  data: data/processed/dataset.yaml
  epochs: 25
  patience: 10
  batch: 16
  cache: disk
  imgsz: 640
  device: 0
  workers: 2
  project: outputs/training
  name: traffic_sign_yolo11n
  exist_ok: true
  pretrained: true
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  box: 7.5
  cls: 0.5
  dfl: 1.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 15.0
  translate: 0.1
  scale: 0.5
  shear: 2.0
  perspective: 0.0001
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.1
  amp: true
  cos_lr: true
  close_mosaic: 15
  seed: 42
  deterministic: true
  save: true
  save_period: 10
  val: true
  plots: true

# Hyperparameter search ranges (for systematic tuning)
hyperparam_search:
  lr0: [0.0005, 0.001, 0.002]
  batch: [8, 16, 32]
  weight_decay: [0.0001, 0.0005, 0.001]
  imgsz: [416, 640]
  confidence: [0.25, 0.35, 0.45, 0.55]
  iou: [0.40, 0.50, 0.60]
